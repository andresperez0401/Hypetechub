services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - apps/api/.env
    ports:
      - '3001:3001'
    volumes:
      # Mount the actual SQLite database and mock data so changes reflect on host/docker instantly
      - ./apps/api/dev.db:/app/apps/api/dev.db
      - ./apps/api/mock-youtube-api.json:/app/apps/api/mock-youtube-api.json
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/api/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001/api
    restart: unless-stopped
    env_file:
      - apps/web/.env.local
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy
